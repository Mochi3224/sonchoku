<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>和風直売所 - こだわり抜いた野菜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* 共通設定・変数 */
    :root {
      --primary-red: #B7282E; /* 緋色（和風の赤） */
      --dark-red: #8f1d22;
      --bg-color: #FDFBF7; /* 和紙のような温かみのある白 */
      --text-color: #333333;
      --gold: #D4AF37;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Serif JP', serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      background-image: radial-gradient(#e5dfd3 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* ヘッダー・ヒーローセクション */
    header {
      background-color: var(--primary-red);
      color: white;
      text-align: center;
      padding: 4rem 1rem;
      border-bottom: 5px solid var(--gold);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: "";
      position: absolute;
      top: -50px; left: -50px; right: -50px; bottom: -50px;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px);
      pointer-events: none;
    }

    h1 {
      font-size: 3rem;
      font-weight: 900;
      margin: 0;
      letter-spacing: 0.2em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      animation: fadeInDown 1s ease-out;
    }

    .catchphrase {
      font-size: 1.5rem;
      margin-top: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      animation: fadeInUp 1.2s ease-out;
    }

    /* メインコンテンツ */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 3rem 1rem;
    }

    .section-title {
      text-align: center;
      font-size: 2rem;
      color: var(--primary-red);
      margin-bottom: 2rem;
      position: relative;
      display: inline-block;
      left: 50%;
      transform: translateX(-50%);
    }

    .section-title::after {
      content: '';
      display: block;
      width: 100%;
      height: 2px;
      background-color: var(--gold);
      margin-top: 0.5rem;
    }

    /* 商品一覧（グリッド） */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
      margin-bottom: 4rem;
    }

    .product-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 2rem 1rem;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }

    .product-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: var(--primary-red);
      transform: scaleX(0);
      transition: transform 0.4s ease;
    }

    .product-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 25px rgba(183, 40, 46, 0.15);
      border-color: var(--primary-red);
    }

    .product-card:hover::before {
      transform: scaleX(1);
    }

    .product-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .product-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--primary-red);
    }

    /* コメントセクション */
    .comment-section {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 2px solid #f4eadd;
    }

    .comment-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-weight: 700;
      color: var(--primary-red);
    }

    input[type="text"],
    textarea {
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary-red);
      box-shadow: 0 0 0 2px rgba(183, 40, 46, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* 押したくなるボタン */
    .submit-btn {
      background: linear-gradient(135deg, var(--primary-red) 0%, var(--dark-red) 100%);
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      font-weight: 700;
      font-family: inherit;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(183, 40, 46, 0.4);
      transition: all 0.3s ease;
      letter-spacing: 0.1em;
      align-self: center;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.5s ease;
    }

    .submit-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 20px rgba(183, 40, 46, 0.6);
    }

    .submit-btn:hover::after {
      left: 100%;
    }

    .submit-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 5px rgba(183, 40, 46, 0.4);
    }

    /* コメントリスト */
    #comment-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .comment-item {
      border-bottom: 1px dashed #ccc;
      padding: 1.5rem 0;
      animation: fadeIn 0.5s ease-out;
    }

    .comment-item:last-child {
      border-bottom: none;
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
    }

    .comment-author {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--primary-red);
    }
    
    .comment-author::before {
      content: '■ ';
      color: var(--gold);
    }

    .comment-date {
      font-size: 0.9rem;
      color: #777;
    }

    .comment-text {
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .loading-msg {
      text-align: center;
      color: #777;
    }

    /* アニメーション */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* レスポンシブ */
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .catchphrase { font-size: 1.1rem; }
      .submit-btn { width: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <h1>茜色農園 直売所</h1>
    <div class="catchphrase">こだわり抜いた野菜です</div>
  </header>

  <main>
    <h2 class="section-title">旬の品書き</h2>
    <div class="products">
      <div class="product-card">
        <div class="product-icon">🍅</div>
        <div class="product-name">大玉トマト</div>
        <p>太陽の恵みをたっぷり浴びた、濃厚で甘みのある自慢のトマトです。</p>
      </div>
      <div class="product-card">
        <div class="product-icon">🍒</div> <div class="product-name">ミニトマト</div>
        <p>お弁当やサラダに最適。フルーツのように甘く弾ける食感です。</p>
      </div>
      <div class="product-card">
        <div class="product-icon">🌿</div>
        <div class="product-name">オクラ</div>
        <p>粘り気が強く、夏バテ防止にぴったり。朝採れの新鮮な状態でお届けします。</p>
      </div>
      <div class="product-card">
        <div class="product-icon">🍈</div>
        <div class="product-name">メロン</div>
        <p>網目が美しく、一口食べればとろけるような甘さと香りが広がります。</p>
      </div>
    </div>

    <h2 class="section-title">お客様の声・ご予約</h2>
    <div class="comment-section">
      <form class="comment-form" id="comment-form">
        <div class="form-group">
          <label for="name">お名前 (必須)</label>
          <input type="text" id="name" required placeholder="例：山田 太郎">
        </div>
        <div class="form-group">
          <label for="message">メッセージ (必須)</label>
          <textarea id="message" required placeholder="野菜の感想や、ご予約の希望などをどうぞ！"></textarea>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">投稿する</button>
      </form>

      <div id="loading" class="loading-msg">読み込み中...</div>
      <ul id="comment-list">
        </ul>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      addDoc, 
      getDocs, 
      query, 
      orderBy, 
      serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // ▼ ここに自分のconfigを貼る ▼
    const firebaseConfig = {
apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    // ▲ ここに自分のconfigを貼る ▲

    // Firebase 初期化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // DOM要素の取得
    const form = document.getElementById('comment-form');
    const nameInput = document.getElementById('name');
    const messageInput = document.getElementById('message');
    const submitBtn = document.getElementById('submit-btn');
    const commentList = document.getElementById('comment-list');
    const loadingMsg = document.getElementById('loading');

    // コメントをFirestoreから取得して表示する関数
    async function loadComments() {
      try {
        commentList.innerHTML = ''; // リストを初期化
        loadingMsg.style.display = 'block';

        // createdAtの降順（新しい順）で取得するクエリ
        const q = query(collection(db, "comments"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);

        loadingMsg.style.display = 'none';

        if (querySnapshot.empty) {
          loadingMsg.style.display = 'block';
          loadingMsg.textContent = 'まだコメントはありません。最初の声を届けてみませんか？';
          return;
        }

        querySnapshot.forEach((doc) => {
          const data = doc.data();
          renderComment(data);
        });

      } catch (error) {
        console.error("コメント取得エラー:", error);
        loadingMsg.textContent = 'コメントの読み込みに失敗しました。';
      }
    }

    // コメントを画面に描画する関数（セキュリティ対策として textContent を使用）
    function renderComment(data) {
      const li = document.createElement('li');
      li.className = 'comment-item';

      // ヘッダー部分（名前と日付）
      const headerDiv = document.createElement('div');
      headerDiv.className = 'comment-header';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'comment-author';
      // XSS対策: textContentを使う
      nameSpan.textContent = data.name;

      const dateSpan = document.createElement('span');
      dateSpan.className = 'comment-date';
      
      // createdAtがserverTimestampの場合、取得直後はnullの可能性があるための処理
      if (data.createdAt && data.createdAt.toDate) {
        const date = data.createdAt.toDate();
        dateSpan.textContent = `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
      } else {
        dateSpan.textContent = '送信中...';
      }

      headerDiv.appendChild(nameSpan);
      headerDiv.appendChild(dateSpan);

      // メッセージ部分
      const textDiv = document.createElement('div');
      textDiv.className = 'comment-text';
      // XSS対策: textContentを使う
      textDiv.textContent = data.text;

      // 組み立て
      li.appendChild(headerDiv);
      li.appendChild(textDiv);
      commentList.appendChild(li);
    }

    // フォーム送信時の処理
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const nameVal = nameInput.value.trim();
      const textVal = messageInput.value.trim();

      if (!nameVal || !textVal) return;

      // ボタンを無効化して連打防止
      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      try {
        // Firestoreへ追加
        await addDoc(collection(db, "comments"), {
          name: nameVal,
          text: textVal,
          createdAt: serverTimestamp()
        });

        // フォームをリセット
        form.reset();
        
        // リストを再読み込み
        await loadComments();

      } catch (error) {
        console.error("コメント追加エラー:", error);
        alert("エラーが発生しました。しばらく経ってから再度お試しください。");
      } finally {
        // ボタンの状態を元に戻す
        submitBtn.disabled = false;
        submitBtn.textContent = '投稿する';
      }
    });

    // 初期ロード時にコメントを取得
    loadComments();

  </script>
</body>
</html>
